<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Atomic Explorer – About</title>
  <style>
    :root {
      color-scheme: dark;
      --ctrl-bg: rgba(15,23,42,0.62);
      --ctrl-bg-hover: rgba(148,163,184,0.14);
      --ctrl-border: rgba(148,163,184,0.22);
      --ctrl-shadow: 0 6px 14px rgba(0,0,0,0.38);
      --ctrl-blur: blur(10px);
    }
    html, body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      background: radial-gradient(circle at 30% 10%, rgba(30,64,175,0.55), rgba(2,6,23,1) 70%);
      color: #f9fafb;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 16px 64px;
      box-sizing: border-box;
    }
    .info-page {
      width: 100%;
      max-width: 920px;
    }
    .info-topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 6px 4px 18px;
    }
    .info-back {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      height: 40px;
      padding: 0 14px;
      border-radius: 999px;
      border: 1px solid var(--ctrl-border);
      background: var(--ctrl-bg);
      color: #e5e7eb;
      cursor: pointer;
      font-size: 13px;
      font-family: inherit;
      text-decoration: none;
      backdrop-filter: var(--ctrl-blur);
      box-shadow: var(--ctrl-shadow);
      transition: background 0.12s ease, transform 0.08s ease, box-shadow 0.12s ease;
    }
    .info-back:hover {
      background: var(--ctrl-bg-hover);
      transform: translateY(-1px);
    }
    .info-language {
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .info-language-btn {
      height: 36px;
      padding: 0 12px;
      border-radius: 999px;
      border: 1px solid var(--ctrl-border);
      background: var(--ctrl-bg);
      color: #e5e7eb;
      cursor: pointer;
      font-size: 12px;
      font-family: inherit;
      backdrop-filter: var(--ctrl-blur);
      box-shadow: var(--ctrl-shadow);
      transition: background 0.12s ease, box-shadow 0.12s ease, transform 0.08s ease;
    }
    .info-language-btn[aria-pressed="true"] {
      background: rgba(56,189,248,0.18);
      border-color: rgba(56,189,248,0.55);
      color: #bfdbfe;
    }
    .info-language-btn:hover {
      background: var(--ctrl-bg-hover);
      transform: translateY(-1px);
    }
    .info-card {
      padding: 28px 28px 36px;
      background: rgba(2,6,23,0.78);
      border: 1px solid var(--ctrl-border);
      border-radius: 22px;
      backdrop-filter: blur(14px);
      box-shadow: var(--ctrl-shadow);
    }
    h1 {
      margin: 4px 0 14px;
      font-size: 26px;
      letter-spacing: 0.02em;
    }
    h2 {
      margin: 26px 0 8px;
      font-size: 16px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      opacity: 0.85;
    }
    p {
      font-size: 14px;
      line-height: 1.6;
      margin: 8px 0;
    }
    code {
      font-family: "SF Mono", Menlo, Monaco, Consolas, monospace;
      font-size: 12.5px;
      padding: 1px 6px;
      border-radius: 4px;
      background: rgba(15,23,42,0.85);
      border: 1px solid rgba(148,163,184,0.18);
    }
    .info-table-wrapper {
      overflow-x: auto;
    }
    table.params {
      width: 100%;
      border-collapse: collapse;
      margin-top: 8px;
      font-size: 13px;
    }
    table.params th,
    table.params td {
      text-align: left;
      padding: 8px 10px;
      border-bottom: 1px solid rgba(148,163,184,0.18);
      vertical-align: top;
    }
    table.params th {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      opacity: 0.75;
      font-weight: 600;
    }
    table.params td:first-child {
      width: 1%;
      white-space: nowrap;
    }
    table.params td:first-child code {
      font-size: 12px;
    }
    .example-link {
      color: #60a5fa;
      text-decoration: none;
      font-weight: 600;
      word-break: break-all;
    }
    .example-link:hover {
      color: #93c5fd;
    }
  </style>
</head>
<body>
  <main class="info-page">
    <div class="info-topbar">
      <a id="infoBackLink" class="info-back" href="index.html">
        <span aria-hidden="true">←</span>
        <span id="infoBackLabel">Back to the application</span>
      </a>
      <div class="info-language" role="group" aria-label="Language">
        <button type="button" class="info-language-btn" data-lang="en" aria-pressed="false">🇺🇸 English</button>
        <button type="button" class="info-language-btn" data-lang="pt" aria-pressed="false">🇧🇷 Português</button>
        <button type="button" class="info-language-btn" data-lang="es" aria-pressed="false">🇪🇸 Español</button>
      </div>
    </div>
    <article class="info-card">
      <h1 id="infoPageTitle">About Atomic Explorer</h1>
      <div id="infoPageBody"></div>
    </article>
  </main>

  <script src="data/info_content.js"></script>
  <script>
    (function () {
      var info = window.AtomicExplorerInfo;
      if (!info) return;
      var params = new URLSearchParams(window.location.search || "");
      var requested = (params.get("lang") || params.get("language") || "").toLowerCase();
      var current = info.SUPPORTED_LANGUAGES.indexOf(requested) >= 0 ? requested : "pt";

      var titleEl = document.getElementById("infoPageTitle");
      var bodyEl = document.getElementById("infoPageBody");
      var backLink = document.getElementById("infoBackLink");
      var backLabel = document.getElementById("infoBackLabel");
      var languageButtons = document.querySelectorAll(".info-language-btn");

      function applyLanguage(lang) {
        current = lang;
        var t = info.tr(lang);
        document.documentElement.setAttribute("lang", lang);
        document.title = t.title + " – Atomic Explorer";
        if (titleEl) titleEl.textContent = t.title;
        if (backLabel) backLabel.textContent = t.backToApp;
        if (backLink) {
          var url = new URL("index.html", window.location.href);
          url.searchParams.set("lang", lang);
          backLink.setAttribute("href", url.toString());
          backLink.setAttribute("title", t.backToApp);
        }
        languageButtons.forEach(function (btn) {
          btn.setAttribute("aria-pressed", btn.getAttribute("data-lang") === lang ? "true" : "false");
        });
        info.render(bodyEl, lang, { exampleBaseUrl: new URL("index.html", window.location.href).toString() });
        // Reflect language choice in the URL without reloading.
        try {
          var u = new URL(window.location.href);
          u.searchParams.set("lang", lang);
          window.history.replaceState({}, "", u.toString());
        } catch (_) {}
      }

      languageButtons.forEach(function (btn) {
        btn.addEventListener("click", function () {
          var lang = btn.getAttribute("data-lang");
          if (!lang) return;
          applyLanguage(lang);
        });
      });

      applyLanguage(current);
    })();
  </script>
</body>
</html>
